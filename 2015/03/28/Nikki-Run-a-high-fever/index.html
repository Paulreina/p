  <div id="page-content"><p>今天在听老婆说鱼的儿子也发高烧，可能是出小儿急疹。</p>
<p>还记得Nikki应该是在1月份的时候也是突然发高烧，但其他也没啥症状，把老婆给急得像热锅上的蚂蚁，接连二晚去医院急症，最后还是市一的医生确认是小儿急疹，没啥问题的，回去吃点退烧药，到了第三天疹子出来就没事了。</p>
<p>-突然记起这事，特此记下。</p>
