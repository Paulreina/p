  <div id="page-content"><p>自从女儿Nikki诞生后，虽然早就想好了英文名Nikki，但中文名一直没有取好。昨天终于去妇保，办好了出生证，定下了中文名。</p>
<p>今天也把 <a target="_blank" rel="noopener" href="http://www.nikki.hk/">Nikki的域名</a> 给注册了。</p>
<p>一直想注册纯Nikki域名，但.com之类的自然是早被注册了，找了几天，还是和Reina决定用 Nikki.hk ，简单明了。费用也不高，选择了在国内的花生壳注册，80大洋&#x2F;年。</p>
